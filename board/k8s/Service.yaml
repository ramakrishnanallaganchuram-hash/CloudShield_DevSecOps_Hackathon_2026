apiVersion: v1
kind: Service
metadata:
  name: boardgame-service
  namespace: cloudshield
  labels:
    app: boardgame

spec:
  type: LoadBalancer

  selector:
    app: boardgame

  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
